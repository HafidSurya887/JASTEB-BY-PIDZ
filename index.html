<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDZ STORE - SECURE AUTH & PROFILE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0f; --text: #fff; --card: rgba(255,255,255,0.03); }
        [data-theme="light"] { --bg: #f4f7f6; --text: #2d3436; --accent: #00b894; --card: #ffffff; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: 0.5s; overflow-x: hidden; }

        /* HEADER & PROFILE */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(10, 10, 15, 0.8); backdrop-filter: blur(10px);
            display: flex; justify-content: flex-end; align-items: center;
            padding: 0 20px; z-index: 2000; border-bottom: 1px solid rgba(0,255,136,0.1);
            display: none; /* Hidden at start */
        }
        .profile-area { position: relative; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); object-fit: cover; }
        
        /* DROPDOWN MENU */
        .dropdown {
            position: absolute; top: 55px; right: 0; width: 200px;
            background: var(--bg); border: 1px solid var(--accent);
            border-radius: 12px; padding: 15px; display: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5); text-align: left;
            animation: slideIn 0.3s;
        }
        @keyframes slideIn { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .dropdown h4 { font-family: 'Orbitron'; font-size: 0.8rem; color: var(--accent); margin-bottom: 5px; }
        .dropdown p { font-size: 0.7rem; color: var(--text); opacity: 0.7; margin-bottom: 15px; }
        .btn-out { width: 100%; padding: 8px; background: #ff4444; color: #fff; border: none; border-radius: 6px; font-weight: 600; cursor: pointer; font-size: 0.7rem; }

        /* AUTH SCREEN */
        #auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .auth-card { width: 100%; max-width: 380px; background: var(--card); padding: 40px 30px; border-radius: 30px; border: 1px solid var(--accent); text-align: center; }
        h1 { font-family: 'Orbitron'; color: var(--accent); margin-bottom: 25px; font-size: 1.3rem; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,136,0.2); border-radius: 10px; color: var(--text); outline: none; }
        input:focus { border-color: var(--accent); }
        .btn-auth { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--accent); color: #000; font-weight: 800; font-family: 'Orbitron'; cursor: pointer; text-transform: uppercase; }
        
        /* MAIN STORE (Hidden at start) */
        #main-store { display: none; width: 100%; max-width: 400px; margin: 90px auto 20px; text-align: center; animation: fadeIn 0.5s; padding: 0 10px; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body data-theme="dark">

    <header id="main-header">
        <div class="profile-area" onclick="toggleDropdown()">
            <img id="header-avatar" src="" alt="Avatar" class="avatar">
            <div class="dropdown" id="profile-dropdown">
                <h4 id="drop-name"></h4>
                <p>Status: Member Premium</p>
                <button class="btn-out" onclick="logout()">LOGOUT</button>
            </div>
        </div>
    </header>

    <div id="auth-container">
        <div class="auth-card">
            <h1 id="auth-title">DAFTAR FIDZ ACCOUNT</h1>
            <input type="text" id="username" placeholder="Masukkan Nama">
            <input type="password" id="password" placeholder="Buat Password">
            
            <div id="confirm-box">
                <input type="password" id="confirm-password" placeholder="Konfirmasi Password (Wajib Sama)">
            </div>

            <button class="btn-auth" id="auth-btn" onclick="handleAuth()">DAFTAR SEKARANG</button>
            
            <p style="font-size: 0.7rem; color: #888; margin-top: 15px;">
                <span id="toggle-text">Sudah punya akun?</span> <span onclick="switchMode()" style="color: var(--accent); cursor: pointer; font-weight: 600;">Klik di sini</span>
            </div>
        </div>
    </div>

    <div id="main-store">
        <h2 style="text-align: center; color: var(--accent); font-family: 'Orbitron';">SELAMAT DATANG DI STORE!</h2>
        <p style="text-align: center; font-size: 0.7rem; opacity: 0.6;">(Menu JASTEB & QRIS taruh di sini)</p>
    </div>

<script>
    let isLoginMode = false;
    const avatars = [
        "https://api.dicebear.com/8.x/avataaars/svg?seed=Felix", // Pria
        "https://api.dicebear.com/8.x/avataaars/svg?seed=Molly" // Wanita
    ];

    function switchMode() {
        isLoginMode = !isLoginMode;
        document.getElementById('auth-title').innerText = isLoginMode ? "LOGIN ACCOUNT" : "DAFTAR FIDZ ACCOUNT";
        document.getElementById('auth-btn').innerText = isLoginMode ? "MASUK STORE" : "DAFTAR SEKARANG";
        document.getElementById('confirm-box').style.display = isLoginMode ? "none" : "block";
        document.getElementById('toggle-text').innerText = isLoginMode ? "Belum punya akun?" : "Sudah punya akun?";
    }

    function handleAuth() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        const conf = document.getElementById('confirm-password').value;

        if (!user || !pass) return alert("Isi Username & Password!");

        if (!isLoginMode) {
            // MODE DAFTAR (Konfirmasi 2x)
            if (pass !== conf) return alert("Password konfirmasi TIDAK COCOK!");
            
            localStorage.setItem('fidz_user', user);
            localStorage.setItem('fidz_pass', pass);
            alert("Daftar Sukses! Silakan Login.");
            switchMode();
        } else {
            // MODE LOGIN
            const savedU = localStorage.getItem('fidz_user');
            const savedP = localStorage.getItem('fidz_pass');

            if (user === savedU && pass === savedP) {
                showStore(user);
            } else { alert("Username/Password Salah!"); }
        }
    }

    function showStore(name) {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('main-store').style.display = 'block';
        document.getElementById('drop-name').innerText = name;

        // Pasang Avatar Acak
        const randomAvatar = avatars[Math.floor(Math.random() * avatars.length)];
        document.getElementById('header-avatar').src = randomAvatar;
    }

    function toggleDropdown() {
        const drop = document.getElementById('profile-dropdown');
        drop.style.display = drop.style.display === 'block' ? 'none' : 'block';
    }

    function logout() {
        if(confirm("Yakin mau Logout?")) {
            location.reload(); 
        }
    }

    // Klik di luar dropdown buat nutup
    window.onclick = function(e) {
        if (!e.target.matches('.profile-area') && !e.target.matches('.avatar') && !e.target.matches('.dropdown h4')) {
            document.getElementById('profile-dropdown').style.display = 'none';
        }
    }
</script>
</body>
</html>
