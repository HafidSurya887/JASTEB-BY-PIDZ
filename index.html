<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASTEB BY PIDZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: #0a0a0f; color: #e0e0e0; min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .card { width: 100%; max-width: 450px; background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); padding: 30px; border-radius: 25px; border: 1px solid rgba(0, 255, 136, 0.3); text-align: center; box-shadow: 0 0 20px rgba(0, 255, 136, 0.1); }
        h1 { font-family: 'Orbitron', sans-serif; color: #00ff88; text-shadow: 0 0 10px #00ff8866; margin-bottom: 5px; }
        .tagline { font-size: 0.7rem; color: #888; letter-spacing: 2px; margin-bottom: 30px; }
        .bar { background: rgba(255, 255, 255, 0.03); margin-bottom: 12px; padding: 15px 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.05); }
        .bar:hover { background: rgba(0, 255, 136, 0.1); border-color: #00ff88; transform: scale(1.02); }
        .price { font-weight: 700; color: #fff; }
        .ress { color: #00ff88; font-weight: 600; font-size: 0.8rem; border: 1px solid #00ff88; padding: 2px 8px; border-radius: 5px; }
        #payment-modal, #processing-screen { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0a0a0f; justify-content: center; align-items: center; flex-direction: column; z-index: 1000; }
        .modal-box { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 20px; width: 260px; height: 260px; display: flex; justify-content: center; align-items: center; box-shadow: 0 0 30px rgba(255,255,255,0.1); }
        .modal-box img { width: 100%; height: 100%; }
        .loader { border: 4px solid rgba(0, 255, 136, 0.1); border-left-color: #00ff88; width: 50px; height: 50px; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .btn { background: #00ff88; color: #000; border: none; width: 80%; max-width: 250px; padding: 15px; border-radius: 12px; font-weight: 800; cursor: pointer; text-transform: uppercase; }
        .btn-cancel { color: #ff4444; margin-top: 20px; background: none; border: none; cursor: pointer; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="card">
    <h1>JASTEB BY PIDZ</h1>
    <p class="tagline">JUBEL HASIL RESS • AUTOMATIC QRIS</p>
    <div class="item-list" id="list-target"></div>
</div>

<div id="payment-modal">
    <h3 style="margin-bottom: 20px; font-family: 'Orbitron'; color: white;">PEMBAYARAN QRIS</h3>
    <div class="modal-box"><img id="qris-image" src="" alt="QRIS"></div>
    <p style="color: #888; font-size: 0.8rem; margin-bottom: 5px;">Total Tagihan:</p>
    <h2 id="pay-total" style="color: #00ff88; margin-bottom: 20px;"></h2>
    <button class="btn" onclick="prosesKeWA()">KONFIRMASI SELESAI</button>
    <button class="btn-cancel" onclick="tutupModal()">KEMBALI</button>
</div>

<div id="processing-screen">
    <div class="loader"></div>
    <h2 style="font-family: 'Orbitron'; color: #00ff88;">MENGKONFIRMASI...</h2>
    <p style="color: #888; margin-top: 10px;">Cek mutasi otomatis sedang berjalan.</p>
</div>

<script>
    const rawQRIS = "00020101021126570011ID.DANA.WWW011893600915392503374602099250337460303UMI51440014ID.CO.QRIS.WWW0215ID10254098107240303UMI5204481453033605802ID5911PIDZ STORED6014Kota Palembang61053011163047403";
    const adminWA = "6288975532473";
    const paket = [5000, 10000, 15000, 20000, 25000];
    let selectedNominal = 0;

    // FUNGSI SAKTI: HITUNG CRC16 CCITT
    function convertCRC16(str) {
        let crc = 0xFFFF;
        for (let c = 0; c < str.length; c++) {
            crc ^= str.charCodeAt(c) << 8;
            for (let i = 0; i < 8; i++) {
                if (crc & 0x8000) crc = (crc << 1) ^ 0x1021;
                else crc = crc << 1;
            }
        }
        crc &= 0xFFFF;
        return crc.toString(16).toUpperCase().padStart(4, '0');
    }

    // FUNGSI SUNTIK NOMINAL
    function makeDynamic(qris, nominal) {
        let q = qris.slice(0, -4); // Buang CRC lama
        let n = nominal.toString();
        let tag54 = "54" + n.length.toString().padStart(2, '0') + n;
        
        // Cek kalo udah ada tag 54, kita ganti. Kalo belum, selipin sebelum tag 58
        if (q.includes("540")) {
            q = q.replace(/54\d{2}\d+/, tag54);
        } else {
            q = q.replace("5802ID", tag54 + "5802ID");
        }
        
        return q + convertCRC16(q);
    }

    // RENDER LIST
    const listHtml = paket.map(n => `
        <div class="bar" onclick="bukaBayar(${n})">
            <span class="price">Rp ${n.toLocaleString('id-ID')}</span>
            <span class="ress">${(n/100)} ${(n==5000)?'+ RESS':'+'}</span>
        </div>
    `).join('');
    document.getElementById('list-target').innerHTML = listHtml;

    function bukaBayar(n) {
        selectedNominal = n;
        document.getElementById('pay-total').innerText = "Rp " + n.toLocaleString('id-ID');
        const dynamicQR = makeDynamic(rawQRIS, n);
        const qrUrl = `https://chart.googleapis.com/chart?cht=qr&chs=350x350&chl=${encodeURIComponent(dynamicQR)}`;
        document.getElementById('qris-image').src = qrUrl;
        document.getElementById('payment-modal').style.display = 'flex';
    }

    function tutupModal() { document.getElementById('payment-modal').style.display = 'none'; }

    function prosesKeWA() {
        document.getElementById('payment-modal').style.display = 'none';
        document.getElementById('processing-screen').style.display = 'flex';
        setTimeout(() => {
            const msg = `DONE MIN BUY JASTEB\nNominal: ${selectedNominal}\nEmail: Isi emailmu`;
            window.location.href = `https://wa.me/${adminWA}?text=${encodeURIComponent(msg)}`;
        }, 3000);
    }
</script>
</body>
</html>
