<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASTEB BY PIDZ</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode_js@1.0.0/qrcode.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .container { max-width: 400px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        h1 { color: #00ff88; margin-bottom: 5px; }
        p { font-size: 0.9em; color: #aaa; }
        .item-list { margin-top: 20px; }
        .bar { background: #252525; margin: 10px 0; padding: 15px; border-radius: 10px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .bar:hover { border-color: #00ff88; background: #2d2d2d; }
        .bar span { display: block; font-weight: bold; }
        .bar .sub { font-size: 0.8em; color: #00ff88; }
        
        /* Modal Payment */
        #payment-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; flex-direction: column; }
        #qrcode { background: white; padding: 10px; border-radius: 10px; margin: 20px auto; }
        .btn { background: #00ff88; color: black; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .btn-cancel { background: #ff4444; color: white; margin-top: 10px; font-size: 0.8em; }
    </style>
</head>
<body>

<div class="container">
    <h1>JASTEB BY PIDZ</h1>
    <p> Ress Aman & Cepat</p>
    
    <div class="item-list">
        <div class="bar" onclick="bayar(5000, '50+ress')">
            <span>Rp 5.000</span>
            <span class="sub">50+ RESS</span>
        </div>
        <div class="bar" onclick="bayar(10000, '100+')">
            <span>Rp 10.000</span>
            <span class="sub">100+</span>
        </div>
        <div class="bar" onclick="bayar(15000, '150+')">
            <span>Rp 15.000</span>
            <span class="sub">150+</span>
        </div>
        <div class="bar" onclick="bayar(20000, '200+')">
            <span>Rp 20.000</span>
            <span class="sub">200+</span>
        </div>
        <div class="bar" onclick="bayar(25000, '250+')">
            <span>Rp 25.000</span>
            <span class="sub">250+</span>
        </div>
    </div>
</div>

<div id="payment-modal">
    <h2 id="pay-title">Pembayaran</h2>
    <div id="qrcode"></div>
    <p>Silakan Scan QRIS di atas</p>
    <button class="btn" onclick="selesai()">SELESAI</button>
    <button class="btn btn-cancel" onclick="tutupModal()">Batal</button>
</div>

<script>
    // MASUKKAN STRING QRIS STATIS LO DI SINI
    const qrisStatis = "00020101021126570011ID.DANA.WWW011893600915392503374602099250337460303UMI51440014ID.CO.QRIS.WWW0215ID10254098107240303UMI5204481453033605802ID5911PIDZ STORED6014Kota Palembang61053011163047403";
    
    const adminWA = "6288975532473"; // GANTI NO WA LO (Awali 62)
    let currentNominal = 0;

    function bayar(nominal, paket) {
        currentNominal = nominal;
        document.getElementById('pay-title').innerText = "Total: Rp " + nominal.toLocaleString();
        document.getElementById('payment-modal').style.display = 'flex';
        
        // Generate QRIS Dinamis Sederhana (Hanya simulasi display untuk web jualan)
        // Note: Logic CRC16 di JS butuh library tambahan, 
        // untuk web jualan mending lgsg tampilin QRIS statis atau pakai API.
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), {
            text: qrisStatis, // Untuk web jualan, nampilin QRIS statis paling aman
            width: 200,
            height: 200
        });
    }

    function tutupModal() {
        document.getElementById('payment-modal').style.display = 'none';
    }

    function selesai() {
        const text = `DONE MIN BUY JASTEB\nNominal: ${currentNominal}\nEmail: Isi emailmu`;
        const url = `https://wa.me/${adminWA}?text=${encodeURIComponent(text)}`;
        window.location.href = url;
    }
</script>

</body>
</html>
