<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIDZ STORE - ALL IN ONE</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #00ff88; --bg: #0a0a0f; --text: #fff; --card: rgba(255,255,255,0.03); }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: 0.5s; overflow-x: hidden; }

        /* HEADER */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 70px;
            background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(10px);
            display: none; justify-content: space-between; align-items: center;
            padding: 0 20px; z-index: 2000; border-bottom: 1px solid rgba(0,255,136,0.1);
        }
        .logo-text { font-family: 'Orbitron'; color: var(--accent); font-size: 0.9rem; }
        .avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid var(--accent); cursor: pointer; }

        /* AUTH SCREEN */
        #auth-container { display: flex; justify-content: center; align-items: center; height: 100vh; padding: 20px; }
        .auth-card { width: 100%; max-width: 380px; background: var(--card); padding: 40px 30px; border-radius: 30px; border: 1px solid var(--accent); text-align: center; }
        h1 { font-family: 'Orbitron'; color: var(--accent); margin-bottom: 25px; font-size: 1.3rem; }
        input { width: 100%; padding: 15px; margin-bottom: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(0,255,136,0.2); border-radius: 10px; color: #fff; outline: none; }

        /* STORE UI */
        #main-store { display: none; width: 100%; max-width: 400px; margin: 90px auto 30px; padding: 0 20px; text-align: center; }
        .store-card { background: var(--card); padding: 25px; border-radius: 25px; border: 1px solid rgba(0,255,136,0.2); }
        .item { 
            background: rgba(255,255,255,0.05); margin-bottom: 12px; padding: 18px; 
            border-radius: 15px; display: flex; justify-content: space-between; align-items: center;
            cursor: pointer; transition: 0.3s; border: 1px solid transparent;
        }
        .item:hover { border-color: var(--accent); background: rgba(0,255,136,0.1); transform: scale(1.02); }
        .ress { background: var(--accent); color: #000; font-size: 0.7rem; font-weight: 800; padding: 4px 10px; border-radius: 8px; }

        /* MODAL & LOADER */
        #modal, #proc { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); justify-content: center; align-items: center; flex-direction: column; z-index: 3000; }
        .qr-box { background: #fff; padding: 10px; border-radius: 15px; width: 250px; height: 250px; margin: 20px 0; }
        .btn-pro { background: var(--accent); color: #000; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 800; font-family: 'Orbitron'; cursor: pointer; }
        .loader { width: 50px; height: 50px; border: 5px solid rgba(0, 255, 136, 0.1); border-left-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="logo-text">FIDZ STORE</div>
        <img id="user-avatar" src="https://api.dicebear.com/8.x/avataaars/svg?seed=Fidz" class="avatar" onclick="logout()">
    </header>

    <div id="auth-container">
        <div class="auth-card">
            <h1 id="auth-title">DAFTAR AKUN</h1>
            <input type="text" id="username" placeholder="Nama User">
            <input type="password" id="password" placeholder="Password">
            <div id="confirm-box"><input type="password" id="confirm-password" placeholder="Ulangi Password"></div>
            <button class="btn-pro" style="width: 100%; border-radius: 12px;" onclick="handleAuth()" id="auth-btn">DAFTAR</button>
            <p style="margin-top: 15px; font-size: 0.8rem; color: #888;">
                <span id="toggle-text">Sudah punya akun?</span> <span onclick="switchMode()" style="color: var(--accent); cursor: pointer;">Klik Login</span>
            </p>
        </div>
    </div>

    <div id="main-store">
        <div class="store-card">
            <h2 style="font-family: 'Orbitron'; color: var(--accent); margin-bottom: 5px;">SELAMAT DATANG!</h2>
            <p id="welcome-msg" style="font-size: 0.8rem; opacity: 0.6; margin-bottom: 25px;"></p>
            <div id="price-list"></div>
        </div>
    </div>

    <div id="modal">
        <h2 id="m-price" style="font-family: 'Orbitron'; color: var(--accent);"></h2>
        <div class="qr-box"><img id="qr-img" src="" style="width: 100%;"></div>
        <button class="btn-pro" onclick="kirimWA()">SUDAH TRANSFER</button>
        <p onclick="closeModal()" style="margin-top: 20px; cursor: pointer; opacity: 0.5;">Kembali</p>
    </div>

    <div id="proc">
        <div class="loader"></div>
        <h3 id="status" style="font-family: 'Orbitron'; color: var(--accent);">MENGECEK DANA...</h3>
    </div>

<script>
    const qrisBase = "00020101021126570011ID.DANA.WWW011893600915392503374602099250337460303UMI51440014ID.CO.QRIS.WWW0215ID10254098107240303UMI5204481453033605802ID5911PIDZ STORED6014Kota Palembang61053011163047403";
    const wa = "6288975532473";
    const paket = [5000, 10000, 15000, 20000, 25000];
    let isLogin = false, currentH = 0;

    function switchMode() {
        isLogin = !isLogin;
        document.getElementById('auth-title').innerText = isLogin ? "LOGIN STORE" : "DAFTAR AKUN";
        document.getElementById('auth-btn').innerText = isLogin ? "LOGIN" : "DAFTAR";
        document.getElementById('confirm-box').style.display = isLogin ? "none" : "block";
        document.getElementById('toggle-text').innerText = isLogin ? "Belum punya akun?" : "Sudah punya akun?";
    }

    function handleAuth() {
        const u = document.getElementById('username').value, p = document.getElementById('password').value, c = document.getElementById('confirm-password').value;
        if (!u || !p) return alert("Isi data!");
        if (!isLogin) {
            if (p !== c) return alert("Password Gak Cocok!");
            localStorage.setItem('fidz_u', u); localStorage.setItem('fidz_p', p);
            alert("Berhasil Daftar! Silakan Login."); switchMode();
        } else {
            if (u === localStorage.getItem('fidz_u') && p === localStorage.getItem('fidz_p')) showStore(u);
            else alert("Salah Password!");
        }
    }

    function showStore(name) {
        document.getElementById('auth-container').style.display = 'none';
        document.getElementById('main-header').style.display = 'flex';
        document.getElementById('main-store').style.display = 'block';
        document.getElementById('welcome-msg').innerText = "Halo " + name + ", pilih paket JASTEB lo:";
        renderList();
    }

    function renderList() {
        document.getElementById('price-list').innerHTML = paket.map(h => `
            <div class="item" onclick="openPay(${h})">
                <span style="font-weight:700">Rp ${h.toLocaleString('id-ID')}</span>
                <span class="ress">${h/100} RESS</span>
            </div>
        `).join('');
    }

    function openPay(n) {
        currentH = n;
        document.getElementById('m-price').innerText = "Rp " + n.toLocaleString('id-ID');
        let q = qrisBase.slice(0, -4);
        let tag = "54" + n.toString().length.toString().padStart(2, '0') + n;
        let final = q.replace("5802ID", tag + "5802ID");
        
        // CRC16
        let crc = 0xFFFF;
        for (let i = 0; i < final.length; i++) {
            crc ^= final.charCodeAt(i) << 8;
            for (let j = 0; j < 8; j++) crc = (crc & 0x8000) ? (crc << 1) ^ 0x1021 : crc << 1;
        }
        final += (crc & 0xFFFF).toString(16).toUpperCase().padStart(4, '0');
        
        document.getElementById('qr-img').src = `https://quickchart.io/chart?cht=qr&chs=300x300&chl=${encodeURIComponent(final)}`;
        document.getElementById('modal').style.display = 'flex';
    }

    function closeModal() { document.getElementById('modal').style.display = 'none'; }

    function kirimWA() {
        document.getElementById('modal').style.display = 'none';
        document.getElementById('proc').style.display = 'flex';
        setTimeout(() => document.getElementById('status').innerText = "MENYIAPKAN RESS...", 1500);
        setTimeout(() => {
            window.location.href = `https://wa.me/${wa}?text=Done JASTEB Rp ${currentH}`;
        }, 3000);
    }

    function logout() { if(confirm("Logout?")) location.reload(); }
</script>
</body>
</html>
